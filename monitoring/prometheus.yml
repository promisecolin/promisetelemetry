global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape metrics from the OTel Collector's Prometheus exporter
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          source: opentelemetry

  # Scrape Prometheus' own metrics
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape Node Exporter for host-level CPU/memory/disk metrics
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: monitoring-server
